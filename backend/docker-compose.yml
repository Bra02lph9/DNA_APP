version: "3.9"

services:
  web:
    build: .
    container_name: dna_backend_web
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      - redis

  worker:
    build: .
    container_name: dna_backend_worker
    command: celery -A tasks.celery_app.celery_app worker --loglevel=info
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: dna_backend_redis
    ports:
      - "6379:6379"
